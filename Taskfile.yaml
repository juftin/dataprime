# https://taskfile.dev

version: "3"

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list-all

  install:
    desc: Install development dependencies via Bun
    cmds:
      - bun install

  lint:
    desc: Validate manifest syntax, code style (Prettier), and code quality (ESLint)
    cmds:
      - echo "Validating manifest.json syntax..."
      - python3 -m json.tool manifest.json > /dev/null
      - echo "Manifest JSON is valid!"
      - echo "Checking files integrity..."
      - test -f content.js && echo "✓ content.js exists"
      - test -f background.js && echo "✓ background.js exists"
      - test -f popup/popup.html && echo "✓ popup/popup.html exists"
      - test -f dashboard/results.html && echo "✓ dashboard/results.html exists"
      - echo "Running Prettier formatting check..."
      - bunx prettier --check .
      - echo "Running ESLint check..."
      - bunx eslint .

  fix:
    desc: Auto-format styles and resolve minor linting issues
    cmds:
      - echo "Running Prettier formatting auto-write..."
      - bunx prettier --write .
      - echo "Running ESLint auto-fix..."
      - bunx eslint --fix .

  check:
    desc: General static check (linting + unit tests)
    cmds:
      - task: lint
      - task: test

  test:
    desc: Run parser and transaction deduplication unit tests with coverage via Bun
    cmds:
      - echo "Running unit tests via Bun..."
      - bun test --coverage tests/parser.test.js

  zip:
    desc: Pack the extension into a distributable zip archive
    cmds:
      - echo "Building extension package..."
      - rm -f dataprime-extension.zip
      - zip -r dataprime-extension.zip manifest.json content.js background.js icons/ popup/ dashboard/ -x "*.DS_Store" "*__pycache__*"
      - echo "Extension packaged successfully as dataprime-extension.zip!"

  build:
    desc: Build task (wraps zip packaging)
    cmds:
      - task: zip
